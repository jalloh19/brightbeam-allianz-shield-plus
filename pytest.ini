[pytest]
DJANGO_SETTINGS_MODULE = backend.config.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts = 
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=85
    -ra
    -v
    --strict-markers

# Markers for test categorization
markers =
    unit: Unit tests (isolated, no DB)
    integration: Integration tests (services, external APIs)
    api: API endpoint tests (DRF)
    e2e: End-to-end tests (Playwright)
    security: Security & auth tests
    performance: Performance & load tests
    slow: Tests that are slow (deselect with -m "not slow")
    db: Tests that use the database

